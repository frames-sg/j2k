name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUSTDOCFLAGS: "-D warnings"

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: rustfmt }
      - run: cargo xtask fmt

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: clippy }
      - run: cargo xtask clippy

  semver:
    strategy:
      fail-fast: false
      matrix:
        package:
          - signinum
          - signinum-core
          - signinum-jpeg
          - signinum-j2k
          - signinum-tilecodec
          - signinum-jpeg-metal
          - signinum-j2k-metal
          - signinum-jpeg-cuda
          - signinum-j2k-cuda
          - signinum-transcode
          - signinum-transcode-metal
          - signinum-j2k-native
          - signinum-cuda-runtime
          - signinum-profile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          package: ${{ matrix.package }}
          release-type: major

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo xtask doc

  stable-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-public-api --version 0.52.0 --locked
      - run: cargo xtask stable-api

  typos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: crate-ci/typos@v1

  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,      rust: stable, arch: x86_64 }
          - { os: ubuntu-latest,      rust: beta,   arch: x86_64 }
          - { os: ubuntu-latest,      rust: "1.88", arch: x86_64 }
          - { os: ubuntu-24.04-arm,   rust: stable, arch: aarch64 }
          - { os: ubuntu-24.04-arm,   rust: "1.88", arch: aarch64 }
          - { os: macos-latest,       rust: stable, arch: aarch64 }
          - { os: macos-latest,       rust: "1.88", arch: aarch64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - run: cargo xtask test

  release-cpu:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo xtask release-cpu

  release-metal:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo xtask release-metal

  no-std:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo xtask no-std

  unsafe-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo xtask unsafe-audit

  bench-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo xtask bench-build

  fuzz-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo xtask fuzz-build

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo xtask package

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-llvm-cov
      - run: cargo xtask coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: signinum-lcov
          path: lcov.info
          if-no-files-found: ignore

  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: EmbarkStudios/cargo-deny-action@v2
        with: { command: check licenses advisories bans sources }
