name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 8 * * *"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUSTDOCFLAGS: "-D warnings"

jobs:
  gpu-path-policy:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      pull-requests: read
    steps:
      - name: Non-PR events do not require GPU path policy
        if: ${{ github.event_name != 'pull_request' }}
        run: echo "GPU path policy only applies to pull requests."
      - name: Require GPU validation for GPU path changes
        if: ${{ github.event_name == 'pull_request' }}
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_API_URL: ${{ github.api_url }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          python3 <<'PY'
          import json
          import os
          import sys
          import urllib.parse
          import urllib.request

          api_url = os.environ["GITHUB_API_URL"].rstrip("/")
          repo = os.environ["REPOSITORY"]
          token = os.environ["GH_TOKEN"]
          pr_number = os.environ["PR_NUMBER"]
          head_sha = os.environ["HEAD_SHA"]

          cuda_prefixes = (
              "crates/j2k-cuda-runtime/",
              "crates/j2k-jpeg-cuda/",
              "crates/j2k-cuda/",
              "crates/j2k-transcode-cuda/",
          )
          metal_prefixes = (
              "crates/j2k-metal-support/",
              "crates/j2k-jpeg-metal/",
              "crates/j2k-metal/",
              "crates/j2k-transcode-metal/",
          )
          shared_gpu_prefixes = (
              "crates/j2k-profile/",
          )
          shared_gpu_exact_paths = {
              ".github/CODEOWNERS",
              ".github/workflows/gpu-validation.yml",
          }
          required_job_by_backend = {
              "cuda": "CUDA API compatibility on x86_64",
              "metal": "Metal validation on Apple Silicon",
          }

          def get_json(path):
              request = urllib.request.Request(
                  f"{api_url}/repos/{repo}{path}",
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {token}",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              with urllib.request.urlopen(request, timeout=30) as response:
                  return json.load(response)

          changed_files = []
          page = 1
          while True:
              files = get_json(f"/pulls/{pr_number}/files?per_page=100&page={page}")
              changed_files.extend(item["filename"] for item in files)
              if len(files) < 100:
                  break
              page += 1

          cuda_changes = [
              path
              for path in changed_files
              if path.startswith(cuda_prefixes)
          ]
          metal_changes = [
              path
              for path in changed_files
              if path.startswith(metal_prefixes)
          ]
          shared_gpu_changes = [
              path
              for path in changed_files
              if path in shared_gpu_exact_paths or path.startswith(shared_gpu_prefixes)
          ]
          gpu_changes = [
              *cuda_changes,
              *metal_changes,
              *shared_gpu_changes,
          ]
          if not gpu_changes:
              print("No GPU path changes detected.")
              sys.exit(0)

          requires_cuda = bool(cuda_changes or shared_gpu_changes)
          requires_metal = bool(metal_changes or shared_gpu_changes)
          required_jobs = set()
          if requires_cuda:
              required_jobs.add(required_job_by_backend["cuda"])
          if requires_metal:
              required_jobs.add(required_job_by_backend["metal"])

          encoded_sha = urllib.parse.quote(head_sha, safe="")
          runs = get_json(
              f"/actions/workflows/gpu-validation.yml/runs?head_sha={encoded_sha}&per_page=50"
          ).get("workflow_runs", [])
          successful_jobs = set()
          for run in runs:
              if run.get("head_sha") != head_sha:
                  continue
              jobs = get_json(f"/actions/runs/{run.get('id')}/jobs?per_page=100").get("jobs", [])
              for job in jobs:
                  if job.get("conclusion") == "success":
                      successful_jobs.add(job.get("name", ""))

          missing_jobs = sorted(required_jobs - successful_jobs)
          if not missing_jobs:
              print(
                  "GPU path changes detected and required gpu-validation.yml jobs "
                  f"succeeded for head SHA {head_sha}."
              )
              sys.exit(0)

          print("GPU path changes require successful gpu-validation.yml jobs.")
          print(f"Head SHA: {head_sha}")
          print("Changed GPU paths:")
          for path in sorted(set(gpu_changes)):
              print(f"  - {path}")
          print("Required successful GPU validation jobs:")
          for job in sorted(required_jobs):
              print(f"  - {job}")
          print("Missing successful GPU validation jobs:")
          for job in missing_jobs:
              print(f"  - {job}")
          if successful_jobs:
              print("Observed successful GPU validation jobs:")
              for job in sorted(successful_jobs):
                  print(f"  - {job}")
          sys.exit(1)
          PY

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: "1.96"
          components: rustfmt
      - run: cargo xtask fmt

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
          components: clippy
      - run: cargo xtask clippy

  panic-surface:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
          components: clippy
      - run: cargo xtask panic-surface

  comparator-parity:
    runs-on: ubuntu-latest
    env:
      J2K_OPENJPEG_BIN: /usr/bin/opj_decompress
      J2K_OPENJPEG_DECOMPRESS_BIN: /usr/bin/opj_decompress
      J2K_OPENJPEG_COMPRESS_BIN: /usr/bin/opj_compress
      J2K_GROK_BIN: /usr/bin/grk_decompress
      J2K_GROK_COMPRESS_BIN: /usr/bin/grk_compress
      J2K_REQUIRE_OPENJPEG: "1"
      J2K_REQUIRE_GROK: "1"
      J2K_REQUIRE_LIBJPEG_TURBO: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
      - name: Install comparator tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            grokj2k-tools \
            libgrokj2k1-dev \
            libopenjp2-tools \
            libturbojpeg0-dev \
            pkg-config
      - name: Verify comparator tools
        run: |
          command -v opj_compress
          command -v opj_decompress
          command -v grk_compress
          command -v grk_decompress
          pkg-config --modversion libgrokj2k
          pkg-config --modversion libturbojpeg
      - run: cargo xtask j2k-bench-signoff

  semver:
    # Published Metal baselines include macOS-gated public API and must be
    # rustdoc-built on macOS for cargo-semver-checks.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: "1.96"
      - run: cargo install cargo-semver-checks --version 0.48.0 --locked
      - run: cargo xtask semver

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
      - run: cargo xtask doc

  stable-api:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: nightly
      - uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912
        with:
          tool: cargo-public-api@0.52.0
      - run: cargo public-api --version || cargo install cargo-public-api --version 0.52.0 --locked
      - run: cargo xtask stable-api

  release-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
      - run: cargo xtask release-integrity

  unsafe-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
      - run: cargo xtask unsafe-audit

  typos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: crate-ci/typos@d80b8e26878e372a041833cd67163dbdb6a4336e

  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,      rust: stable, arch: x86_64 }
          - { os: ubuntu-latest,      rust: beta,   arch: x86_64 }
          - { os: ubuntu-latest,      rust: "1.96", arch: x86_64 }
          - { os: ubuntu-24.04-arm,   rust: stable, arch: aarch64 }
          - { os: ubuntu-24.04-arm,   rust: "1.96", arch: aarch64 }
          - { os: macos-latest,       rust: stable, arch: aarch64 }
          - { os: macos-latest,       rust: "1.96", arch: aarch64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: ${{ matrix.rust }}
      - run: cargo xtask test

  release-cpu:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
      - run: cargo xtask release-cpu

  release-metal:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
      - run: cargo xtask release-metal

  no-std:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
      - run: cargo xtask no-std

  miri:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: nightly
          components: miri
      - run: cargo xtask miri

  bench-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
      - run: cargo xtask bench-build

  fuzz-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
      - run: cargo xtask fuzz-build

  fuzz-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: nightly
      - uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912
        with:
          tool: cargo-fuzz
      - run: cargo xtask fuzz-run
        env:
          J2K_FUZZ_RUNS: "512"
          J2K_FUZZ_MAX_TOTAL_TIME_SECONDS: "60"

  fuzz-run-long:
    if: ${{ github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: nightly
      - uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912
        with:
          tool: cargo-fuzz
      - run: cargo xtask fuzz-run
        env:
          J2K_FUZZ_RUNS: "20000"
          J2K_FUZZ_MAX_TOTAL_TIME_SECONDS: "900"

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
      - run: cargo xtask package

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
      - uses: taiki-e/install-action@91534edaf9fd796a162759d80d49cdff574bff2c
        with:
          tool: cargo-llvm-cov
      - run: cargo xtask coverage
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: j2k-lcov
          path: lcov.info
          if-no-files-found: ignore

  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
      - uses: EmbarkStudios/cargo-deny-action@8f84122a46a358a27cb0625d85ad60ab436a1b87
        with: { command: check licenses advisories bans sources }
