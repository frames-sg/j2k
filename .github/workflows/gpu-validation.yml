name: GPU validation

on:
  workflow_dispatch:
    inputs:
      run-timed-benchmarks:
        description: "Run Criterion timing benches on the GPU runners"
        type: boolean
        required: false
        default: false
      run-metal-validation:
        description: "Run Apple Silicon Metal validation jobs"
        type: boolean
        required: false
        # Default off: with no Metal runner online the job sits queued forever,
        # which holds the whole run "in progress" and locks every job's logs
        # (including the CUDA gate). Opt in explicitly when a Metal runner is up.
        default: false
      run-linux-ci:
        description: "Run the Linux CI gate on the self-hosted CUDA runner"
        type: boolean
        required: false
        default: false
      run-nvidia-baseline:
        description: "Run the nvJPEG/nvJPEG2000 baseline comparison (requires nvJPEG2000 installed on the runner)"
        type: boolean
        required: false
        default: false
      run-cuda-htj2k-decode-profile:
        description: "Collect CUDA HTJ2K decode RCA/profile log, trace, and Criterion artifacts"
        type: boolean
        required: false
        default: false
      run-adoption-benchmark:
        description: "Run the fixture-backed adoption benchmark bundle on the CUDA runner"
        type: boolean
        required: false
        default: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  linux-ci:
    if: ${{ inputs.run-linux-ci }}
    name: Linux CI on self-hosted CUDA runner
    runs-on: [self-hosted, Linux, X64, cuda]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
          components: rustfmt, clippy
      - name: Show runner diagnostics
        run: |
          uname -a
          rustc -Vv
          cargo -V
      - run: cargo xtask ci
      - run: cargo xtask no-std
      - run: cargo xtask bench-build
      - run: cargo xtask fuzz-build
      - name: Install CI helper tools
        run: |
          cargo install typos-cli --version 1.42.3 --locked
          cargo install cargo-deny --locked
          cargo install cargo-llvm-cov --locked
      - run: cargo xtask typos
      - run: cargo xtask deny
      - run: cargo xtask coverage

  metal-apple-silicon:
    if: ${{ inputs.run-metal-validation }}
    name: Metal validation on Apple Silicon
    runs-on: [self-hosted, macOS, ARM64, metal]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
      - run: cargo test -p j2k-jpeg-metal --all-targets
      - run: cargo test -p j2k-metal --all-targets
      - run: cargo bench -p j2k-jpeg-metal --no-run
      - if: ${{ inputs.run-timed-benchmarks }}
        env:
          J2K_GPU_BENCH_DIM: "1024"
          J2K_GPU_BENCH_BATCH: "64"
          J2K_GPU_BENCH_BATCH_DIM: "1024"
        run: cargo bench -p j2k-jpeg-metal --bench device_upload -- --noplot --sample-size 10 --warm-up-time 1 --measurement-time 2
      - if: ${{ inputs.run-timed-benchmarks }}
        run: cargo bench -p j2k-jpeg-metal --bench compare -- --noplot --sample-size 10 --warm-up-time 1 --measurement-time 2

  # cuda-x86_64-compatibility is THE authoritative CUDA parity gate.
  # It must be run (via workflow_dispatch) before merging any change to the
  # CUDA encode path (crates/j2k-cuda, crates/j2k-cuda-runtime).
  # The job is workflow_dispatch-only; do not add push/pull_request triggers
  # without a policy decision — these are cost-sensitive self-hosted GPU runners.
  cuda-x86_64-compatibility:
    name: CUDA API compatibility on x86_64
    runs-on: [self-hosted, Linux, X64, cuda]
    env:
      NVCC: /usr/local/cuda/bin/nvcc
      J2K_REQUIRE_CUDA_RUNTIME: "1"
      J2K_REQUIRE_CUDA_HTJ2K_STRICT: "1"
      J2K_REQUIRE_CUDA_JPEG_HARDWARE_DECODE: "1"
      RUST_TEST_THREADS: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
      - name: Assert CUDA runtime gate is set
        run: |
          test -n "${J2K_REQUIRE_CUDA_RUNTIME:-}" || { echo "J2K_REQUIRE_CUDA_RUNTIME not set — parity tests would silently skip"; exit 1; }
      - name: Show CUDA runner diagnostics
        run: |
          uname -a
          rustc -Vv
          cargo -V
          if command -v nvidia-smi >/dev/null 2>&1; then
            nvidia-smi
          else
            echo "nvidia-smi not found; CUDA runtime validation requires a working CUDA driver"
          fi
          command -v nvcc
          nvcc --version
      - run: cargo test -p j2k-cuda-runtime --all-targets
      - run: cargo test -p j2k-cuda-runtime --all-targets --features cuda-profiling
      - run: cargo test -p j2k-jpeg-cuda --all-targets --features cuda-runtime
      - run: cargo test -p j2k-cuda --all-targets --features cuda-runtime
      - name: Run HTJ2K encode parity tests with executed-count floor
        run: |
          out=$(cargo test -p j2k-cuda --features cuda-runtime --test htj2k_encode_parity -- --nocapture 2>&1)
          echo "$out"
          passed=$(echo "$out" | sed -n 's/^test result: ok\. \([0-9]\+\) passed.*/\1/p' | head -n1)
          echo "parity tests passed: ${passed:-0}"
          test "${passed:-0}" -ge 8 || { echo "Expected at least 8 executed parity tests, got ${passed:-0} — tests may have silently skipped"; exit 1; }
      - run: cargo test -p j2k-transcode-cuda --all-targets --features cuda-runtime
      - name: Run JPEG->HTJ2K transcode parity tests with executed-count floor
        run: |
          out=$(cargo test -p j2k-transcode-cuda --features cuda-runtime --test reversible_dwt53_parity --test dwt97_parity --test dwt97_batch_parity --test htj2k97_codeblock_parity --test jpeg_to_htj2k -- --nocapture 2>&1)
          echo "$out"
          passed=$(echo "$out" | sed -n 's/^test result: ok\. \([0-9]\+\) passed.*/\1/p' | awk '{s+=$1} END{print s+0}')
          echo "transcode parity tests passed: ${passed:-0}"
          test "${passed:-0}" -ge 7 || { echo "Expected at least 7 executed transcode parity tests, got ${passed:-0} — tests may have silently skipped"; exit 1; }
      - run: cargo test -p j2k-cuda --all-targets --features cuda-profiling
      # Opt-in test-only NVIDIA codec comparator. Requires a separately-installed
      # library (set NVJPEG2K_LIB_DIR / NVJPEG2K_INCLUDE_DIR if it is not under
      # /usr/local/cuda). Set the repo variable J2K_BENCH_SVS to an .svs on
      # the runner to extract real WSI tiles; or J2K_BENCH_JPEG_DIR to a
      # pre-extracted tile directory. With neither, it runs the committed pancreas
      # tile corpus and requires at least 100 benchmark tiles.
      - name: NVIDIA baseline comparison
        if: ${{ inputs.run-nvidia-baseline }}
        env:
          J2K_REQUIRE_CUDA_RUNTIME: "1"
          J2K_REQUIRE_CUDA_HTJ2K_STRICT: "1"
          J2K_REQUIRE_NV_BASELINE_BUILD: "1"
          J2K_BENCH_SVS: ${{ vars.J2K_BENCH_SVS }}
          J2K_BENCH_JPEG_DIR: ${{ vars.J2K_BENCH_JPEG_DIR }}
        run: |
          set -e
          DIR="${J2K_BENCH_JPEG_DIR:-}"
          if [ -z "$DIR" ] && [ -n "${J2K_BENCH_SVS:-}" ]; then
            if [ ! -f "${J2K_BENCH_SVS}" ]; then
              echo "Configured J2K_BENCH_SVS does not exist: ${J2K_BENCH_SVS}" >&2
              exit 1
            fi
            echo "extracting benchmark tiles from ${J2K_BENCH_SVS}"
            cargo run --release --manifest-path tests/nvidia-baseline/Cargo.toml --bin svs_extract -- \
              "${J2K_BENCH_SVS}" "${RUNNER_TEMP:-/tmp}/svs_bench_tiles" \
              --limit 256 --stride 51 --quality 85 --min-tissue 0.6
            DIR="${RUNNER_TEMP:-/tmp}/svs_bench_tiles"
          fi
          # Default to the committed pancreas tissue tiles when nothing else is set.
          if [ -z "$DIR" ]; then
            DIR="tests/nvidia-baseline/benchtiles/pancreas"
          fi
          export J2K_BENCH_JPEG_DIR="$DIR"
          echo "benchmark JPEG dir: ${J2K_BENCH_JPEG_DIR}"
          cargo test --manifest-path tests/nvidia-baseline/Cargo.toml --features nvjpeg2000 --all-targets
          cargo clippy --manifest-path tests/nvidia-baseline/Cargo.toml --features nvjpeg2000 --all-targets -- -D warnings
          cargo run --release --manifest-path tests/nvidia-baseline/Cargo.toml --features nvjpeg2000 --bin transcode_compare -- \
            --decomposition-levels 1 \
            --quant-scales 1.90 \
            --match-nvidia-bytes \
            --match-tolerance 0.20 \
            --min-tiles 100 \
            --warmup 3 \
            --iterations 8 \
            --json target/transcode_compare_level1.json \
            --csv target/transcode_compare_level1.csv
          python3 -m json.tool target/transcode_compare_level1.json >/dev/null
          python3 tests/nvidia-baseline/scripts/assert_transcode_perf.py \
            --json target/transcode_compare_level1.json \
            --label cuda-htj2k-transcode-level1-rate-match \
            --min-cuda-ht-mps "${J2K_LEVEL1_CUDA_HT_MIN_MPS:-350}" \
            --min-cuda-ht-speedup-vs-nvidia "${J2K_LEVEL1_CUDA_HT_MIN_SPEEDUP_VS_NVIDIA:-4.0}" \
            --max-byte-delta-abs 0.20 \
            --min-ht-codeblock-dispatches 1
          cargo run --release --manifest-path tests/nvidia-baseline/Cargo.toml --features nvjpeg2000 --bin transcode_compare -- \
            --decomposition-levels 2 \
            --quant-scales 1.00 \
            --subband-scales 1.00,1.00,1.00,1.00 \
            --match-nvidia-bytes \
            --match-tolerance 0.20 \
            --min-tiles 100 \
            --warmup 3 \
            --iterations 8 \
            --json target/transcode_compare_level2.json \
            --csv target/transcode_compare_level2.csv
          python3 -m json.tool target/transcode_compare_level2.json >/dev/null
          python3 tests/nvidia-baseline/scripts/assert_transcode_perf.py \
            --json target/transcode_compare_level2.json \
            --label cuda-htj2k-transcode-level2-rate-match \
            --min-cuda-ht-mps "${J2K_LEVEL2_CUDA_HT_MIN_MPS:-60}" \
            --min-cuda-ht-speedup-vs-nvidia "${J2K_LEVEL2_CUDA_HT_MIN_SPEEDUP_VS_NVIDIA:-1.10}" \
            --max-byte-delta-abs 0.20 \
            --min-ht-codeblock-dispatches 1
          cp target/transcode_compare_level2.json target/transcode_compare.json
          cp target/transcode_compare_level2.csv target/transcode_compare.csv
          cargo run --release --manifest-path tests/nvidia-baseline/Cargo.toml --features nvjpeg2000 --bin decode_compare -- \
            --jpeg-dir "${J2K_BENCH_JPEG_DIR}" \
            --warmup 2 \
            --iterations 10 \
            --min-inputs 100 \
            --max-inputs 100 \
            --json target/decode_compare.json \
            --csv target/decode_compare.csv
          python3 -m json.tool target/decode_compare.json >/dev/null
      - name: Upload NVIDIA baseline comparison artifacts
        if: ${{ inputs.run-nvidia-baseline && always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: nvidia-baseline-comparison
          path: |
            target/transcode_compare.json
            target/transcode_compare.csv
            target/transcode_compare_level1.json
            target/transcode_compare_level1.csv
            target/transcode_compare_level2.json
            target/transcode_compare_level2.csv
            target/decode_compare.json
            target/decode_compare.csv
          if-no-files-found: warn
      - run: cargo clippy -p j2k-cuda-runtime --all-targets -- -D warnings
      - run: cargo clippy -p j2k-cuda-runtime --all-targets --features cuda-profiling -- -D warnings
      - run: cargo clippy -p j2k-cuda --all-targets --features cuda-runtime -- -D warnings
      - run: cargo clippy -p j2k-transcode-cuda --all-targets --features cuda-runtime -- -D warnings
      - run: cargo clippy -p j2k-cuda --all-targets --features cuda-profiling -- -D warnings
      - run: cargo bench -p j2k-jpeg-cuda --bench device_decode --features cuda-runtime --no-run
      - run: cargo bench -p j2k-cuda --bench encode_stages --features cuda-runtime --no-run
      - run: cargo bench -p j2k-cuda --bench htj2k_decode --features cuda-runtime --no-run
      - run: cargo bench -p j2k-cuda --bench htj2k_encode --features cuda-runtime --no-run
      - if: ${{ inputs.run-timed-benchmarks }}
        env:
          J2K_REQUIRE_CUDA_BENCH: "1"
          J2K_GPU_BENCH_DIM: "4096"
          J2K_GPU_BENCH_BATCH: "64"
          J2K_GPU_BENCH_BATCH_DIM: "1024"
        run: cargo bench -p j2k-jpeg-cuda --bench device_decode --features cuda-runtime -- --noplot --sample-size 10 --warm-up-time 1 --measurement-time 2
      - if: ${{ inputs.run-timed-benchmarks }}
        env:
          J2K_REQUIRE_CUDA_BENCH: "1"
        run: cargo bench -p j2k-cuda --bench encode_stages --features cuda-runtime -- --noplot --sample-size 10 --warm-up-time 1 --measurement-time 2
      - if: ${{ inputs.run-timed-benchmarks }}
        env:
          J2K_REQUIRE_CUDA_BENCH: "1"
        run: cargo bench -p j2k-cuda --bench htj2k_decode --features cuda-runtime -- --noplot --sample-size 10 --warm-up-time 1 --measurement-time 2
      - name: CUDA HTJ2K decode RCA profile
        if: ${{ inputs.run-cuda-htj2k-decode-profile }}
        env:
          J2K_REQUIRE_CUDA_RUNTIME: "1"
          J2K_REQUIRE_CUDA_HTJ2K_STRICT: "1"
          J2K_REQUIRE_CUDA_BENCH: "1"
          J2K_PROFILE_STAGES: summary
          J2K_CUDA_TRACE: ${{ github.workspace }}/target/cuda_htj2k_decode_trace.json
        run: |
          set -o pipefail
          mkdir -p target
          samply_status_file=target/cuda_htj2k_decode_samply_status.txt
          bench_cmd=(
            cargo bench -p j2k-cuda --bench htj2k_decode --features cuda-runtime,cuda-profiling --
            --noplot --sample-size 10 --warm-up-time 1 --measurement-time 2
          )
          if ! command -v samply >/dev/null 2>&1; then
            RUSTFLAGS="" cargo install samply --version 0.13.1 --locked
          fi
          samply --version
          run_samply=1
          if [ -r /proc/sys/kernel/perf_event_paranoid ]; then
            current_perf_event_paranoid="$(cat /proc/sys/kernel/perf_event_paranoid)"
            echo "perf_event_paranoid=${current_perf_event_paranoid}"
            if [ "${current_perf_event_paranoid}" -gt 1 ] 2>/dev/null; then
              perf_lowered=0
              if [ -w /proc/sys/kernel/perf_event_paranoid ]; then
                if echo 1 > /proc/sys/kernel/perf_event_paranoid; then
                  perf_lowered=1
                fi
              fi
              if [ "${perf_lowered}" -ne 1 ] && command -v sudo >/dev/null 2>&1; then
                if echo 1 | sudo -n tee /proc/sys/kernel/perf_event_paranoid >/dev/null; then
                  perf_lowered=1
                else
                  echo "passwordless sudo could not lower perf_event_paranoid for samply"
                fi
              fi
              if [ "${perf_lowered}" -eq 1 ]; then
                echo "perf_event_paranoid=$(cat /proc/sys/kernel/perf_event_paranoid)"
              else
                run_samply=0
                {
                  echo "samply_status=blocked"
                  echo "perf_event_paranoid=${current_perf_event_paranoid}"
                  echo "reason=passwordless sudo unavailable and /proc/sys/kernel/perf_event_paranoid is not writable"
                  echo "fallback=cargo bench with J2K_PROFILE_STAGES and J2K_CUDA_TRACE"
                } | tee "${samply_status_file}"
              fi
            fi
          fi
          if [ "${run_samply}" -eq 1 ]; then
            echo "samply_status=attempting" | tee "${samply_status_file}"
            samply record --save-only -o target/cuda_htj2k_decode_samply.json.gz -- \
              "${bench_cmd[@]}" \
              2>&1 | tee target/cuda_htj2k_decode_profile.log
            echo "samply_status=recorded" > "${samply_status_file}"
          else
            "${bench_cmd[@]}" 2>&1 | tee target/cuda_htj2k_decode_profile.log
          fi
      - name: Upload CUDA HTJ2K decode RCA profile artifacts
        if: ${{ inputs.run-cuda-htj2k-decode-profile && always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: cuda-htj2k-decode-rca-profile
          path: |
            target/cuda_htj2k_decode_profile.log
            target/cuda_htj2k_decode_trace.json
            target/cuda_htj2k_decode_samply.json.gz
            target/cuda_htj2k_decode_samply_status.txt
            target/criterion
          if-no-files-found: warn
      - if: ${{ inputs.run-timed-benchmarks }}
        env:
          J2K_REQUIRE_CUDA_BENCH: "1"
        run: cargo bench -p j2k-cuda --bench htj2k_encode --features cuda-runtime -- --noplot --sample-size 10 --warm-up-time 1 --measurement-time 2
      - name: CUDA adoption benchmark bundle
        if: ${{ inputs.run-adoption-benchmark }}
        env:
          J2K_ADOPTION_FIXTURES: ${{ vars.J2K_ADOPTION_FIXTURES }}
          J2K_ADOPTION_MANIFEST: ${{ vars.J2K_ADOPTION_MANIFEST }}
          J2K_ADOPTION_ENCODE_FIXTURES: ${{ vars.J2K_ADOPTION_ENCODE_FIXTURES }}
          J2K_ADOPTION_ENCODE_MANIFEST: ${{ vars.J2K_ADOPTION_ENCODE_MANIFEST }}
          J2K_ADOPTION_OUT_DIR: target/j2k-adoption-benchmark/cuda-full
        run: |
          set -euo pipefail
          command -v opj_compress >/dev/null
          command -v grk_compress >/dev/null
          if [ -n "${J2K_ADOPTION_FIXTURES:-}${J2K_ADOPTION_MANIFEST:-}${J2K_ADOPTION_ENCODE_FIXTURES:-}${J2K_ADOPTION_ENCODE_MANIFEST:-}" ]; then
            : "${J2K_ADOPTION_FIXTURES:?Set repository variable J2K_ADOPTION_FIXTURES to the pinned decode fixture directory list}"
            : "${J2K_ADOPTION_MANIFEST:?Set repository variable J2K_ADOPTION_MANIFEST to the pinned decode manifest TSV}"
            : "${J2K_ADOPTION_ENCODE_FIXTURES:?Set repository variable J2K_ADOPTION_ENCODE_FIXTURES to the pinned staged PNM encode fixture directory list}"
            : "${J2K_ADOPTION_ENCODE_MANIFEST:?Set repository variable J2K_ADOPTION_ENCODE_MANIFEST to the pinned encode manifest TSV}"
          else
            echo "No adoption corpus repository variables set; building the default public starter corpus"
            mkdir -p target/j2k-public-corpora/kodak
            for n in $(seq -w 1 24); do
              kodak="target/j2k-public-corpora/kodak/kodim${n}.png"
              if [ ! -f "${kodak}" ]; then
                curl -L --fail \
                  "https://r0k.us/graphics/kodak/kodak/kodim${n}.png" \
                  -o "${kodak}"
              fi
            done
            cargo xtask adoption-materialize \
              --encode-fixtures target/j2k-public-corpora/kodak \
              --source-command "downloaded-from-r0k-us-kodak-lossless-true-color" \
              --license-status redistributable \
              --corpus-name kodak \
              --corpus-category natural-image \
              --out-dir target/j2k-public-corpora/materialized-kodak
            if [ ! -d target/j2k-public-corpora/openjpeg-data/.git ]; then
              git clone --depth 1 https://github.com/uclouvain/openjpeg-data \
                target/j2k-public-corpora/openjpeg-data
            fi
            cargo xtask adoption-curate \
              --fixtures target/j2k-public-corpora/openjpeg-data/input/conformance \
              --encode-command "source-native-openjpeg-data-conformance-dir" \
              --license-status permissive-test-fixture \
              --corpus-name openjpeg-data-conformance \
              --corpus-category conformance \
              --out-dir target/j2k-public-corpora/openjpeg-conformance-curated
            cargo xtask adoption-curate \
              --fixtures target/j2k-public-corpora/openjpeg-data/input/nonregression \
              --encode-command "source-native-openjpeg-data-nonregression-dir" \
              --license-status permissive-test-fixture \
              --corpus-name openjpeg-data \
              --corpus-category interop \
              --max-files 24 \
              --out-dir target/j2k-public-corpora/openjpeg-interop-curated
            mkdir -p target/j2k-public-corpora/combined-adoption
            awk 'FNR == 1 && NR != 1 { next } { print }' \
              target/j2k-public-corpora/materialized-kodak/fixtures.tsv \
              target/j2k-public-corpora/openjpeg-conformance-curated/fixtures.tsv \
              target/j2k-public-corpora/openjpeg-interop-curated/fixtures.tsv \
              > target/j2k-public-corpora/combined-adoption/fixtures.tsv
            cp target/j2k-public-corpora/materialized-kodak/encode-fixtures.tsv \
              target/j2k-public-corpora/combined-adoption/encode-fixtures.tsv
            J2K_ADOPTION_FIXTURES="target/j2k-public-corpora/materialized-kodak/decode-fixtures:target/j2k-public-corpora/openjpeg-conformance-curated/fixtures:target/j2k-public-corpora/openjpeg-interop-curated/fixtures"
            J2K_ADOPTION_MANIFEST="target/j2k-public-corpora/combined-adoption/fixtures.tsv"
            J2K_ADOPTION_ENCODE_FIXTURES="target/j2k-public-corpora/materialized-kodak/staged-pnm"
            J2K_ADOPTION_ENCODE_MANIFEST="target/j2k-public-corpora/combined-adoption/encode-fixtures.tsv"
          fi
          cargo xtask adoption-benchmark \
            --fixtures "${J2K_ADOPTION_FIXTURES}" \
            --manifest "${J2K_ADOPTION_MANIFEST}" \
            --encode-fixtures "${J2K_ADOPTION_ENCODE_FIXTURES}" \
            --encode-manifest "${J2K_ADOPTION_ENCODE_MANIFEST}" \
            --cuda \
            --require-cuda \
            --out-dir "${J2K_ADOPTION_OUT_DIR}"
          cargo xtask adoption-report \
            --run-dir "${J2K_ADOPTION_OUT_DIR}" \
            --out "${J2K_ADOPTION_OUT_DIR}/adoption-report.md"
      - name: Upload CUDA adoption benchmark artifacts
        if: ${{ inputs.run-adoption-benchmark && always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: cuda-adoption-benchmark
          path: target/j2k-adoption-benchmark/cuda-full
          if-no-files-found: warn
