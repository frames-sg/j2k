name: publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry-run-only:
        description: "Run cargo publish in dry-run mode"
        type: boolean
        required: false
        default: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CRATES_IO_INDEX_SETTLE_SECONDS: "130"
  DRY_RUN_ONLY: ${{ github.event_name == 'workflow_dispatch' && inputs.dry-run-only }}

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
      - run: cargo xtask release-integrity

  publish-j2k-core:
    needs: [preflight]
    runs-on: ubuntu-latest
    environment: crates-io-publish
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
      - run: scripts/publish-crate.sh j2k-core
        env:
          CRATES_IO_API_TOKEN: ${{ secrets.CRATES_IO_API_TOKEN }}

  publish-j2k-profile:
    needs: [publish-j2k-core]
    runs-on: ubuntu-latest
    environment: crates-io-publish
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
      - run: scripts/publish-crate.sh j2k-profile
        env:
          CRATES_IO_API_TOKEN: ${{ secrets.CRATES_IO_API_TOKEN }}

  publish-j2k-types:
    needs: [publish-j2k-profile]
    runs-on: ubuntu-latest
    environment: crates-io-publish
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
      - run: scripts/publish-crate.sh j2k-types
        env:
          CRATES_IO_API_TOKEN: ${{ secrets.CRATES_IO_API_TOKEN }}

  publish-j2k-cuda-runtime:
    needs: [publish-j2k-types]
    runs-on: ubuntu-latest
    environment: crates-io-publish
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
      - run: scripts/publish-crate.sh j2k-cuda-runtime
        env:
          CRATES_IO_API_TOKEN: ${{ secrets.CRATES_IO_API_TOKEN }}

  publish-j2k-metal-support:
