name: publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CRATES_IO_ALLOW_PUBLISHED_RERUN: ${{ vars.CRATES_IO_ALLOW_PUBLISHED_RERUN || 'false' }}
  DRY_RUN_ONLY: ${{ github.event_name == 'workflow_dispatch' }}

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: "1.96"
      - name: Enforce dry-run-only manual publishing
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: test "${DRY_RUN_ONLY}" = "true"
      - name: Verify annotated tag and exact-SHA release evidence
        if: ${{ github.event_name == 'push' }}
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_API_URL: ${{ github.api_url }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          candidate_sha="$(git rev-parse HEAD)"
          origin_url="$(git remote get-url origin)"
          python3 scripts/github_actions_verify.py verify-release \
            --repository "${REPOSITORY}" \
            --origin-url "${origin_url}" \
            --server-url "${GITHUB_SERVER_URL}" \
            --tag "${RELEASE_TAG}" \
            --candidate-sha "${candidate_sha}" \
            --ci-workflow full-validation.yml \
            --ci-branch main \
            --aggregate-job "Release candidate aggregate" \
            --gpu-workflow gpu-validation.yml \
            --cuda-job "CUDA full release validation" \
            --metal-job "Metal full release validation"
      - name: Verify release metadata integrity
        run: cargo xtask release-integrity
      - name: Verify final publish metadata
        if: ${{ github.event_name == 'push' }}
        run: cargo xtask release-integrity --publish
      - name: Verify canonical tag and current registry prefix
        if: ${{ github.event_name == 'push' }}
        run: scripts/publish-crate.sh --preflight-all
      - name: Package and checksum the complete release manifest
        run: python3 scripts/publish_release.py preflight

  publish:
    if: ${{ github.event_name == 'push' }}
    needs: [preflight]
    runs-on: ubuntu-latest
    timeout-minutes: 120
    environment: crates-io-publish
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: nightly-2026-06-28
      - name: Revalidate canonical release checkout after environment approval
        run: scripts/publish-crate.sh --preflight-all
      - name: Publish the remaining checksum-matched manifest prefix
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_API_TOKEN }}
          CARGO_UNSTABLE_PUBLISH_TIMEOUT: "true"
          CARGO_PUBLISH_TIMEOUT: "600"
        run: python3 scripts/publish_release.py publish
