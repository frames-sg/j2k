name: publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  actions: read
  contents: read

env:
  CARGO_TERM_COLOR: always
  CRATES_IO_ALLOW_PUBLISHED_RERUN: ${{ vars.CRATES_IO_ALLOW_PUBLISHED_RERUN || 'false' }}
  CRATES_IO_INDEX_SETTLE_SECONDS: "130"
  DRY_RUN_ONLY: ${{ github.event_name == 'workflow_dispatch' }}

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
      - name: Enforce dry-run-only manual publishing
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: test "${DRY_RUN_ONLY}" = "true"
      - name: Verify annotated tag and exact-SHA release evidence
        if: ${{ github.event_name == 'push' }}
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_API_URL: ${{ github.api_url }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          candidate_sha="$(git rev-parse HEAD)"
          origin_url="$(git remote get-url origin)"
          python3 scripts/github_actions_verify.py verify-release \
            --repository "${REPOSITORY}" \
            --origin-url "${origin_url}" \
            --server-url "${GITHUB_SERVER_URL}" \
            --tag "${RELEASE_TAG}" \
            --candidate-sha "${candidate_sha}" \
            --ci-workflow ci.yml \
            --ci-branch main \
            --aggregate-job "Release candidate aggregate" \
            --gpu-workflow gpu-validation.yml \
            --cuda-job "CUDA API compatibility on x86_64" \
            --metal-job "Metal validation on Apple Silicon"
      - name: Verify release metadata integrity
        run: cargo xtask release-integrity
      - name: Verify every crates.io target version before publication
        if: ${{ github.event_name == 'push' }}
        run: scripts/publish-crate.sh --preflight-all

  publish-j2k-core:
    needs: [preflight]
    runs-on: ubuntu-latest
    environment: crates-io-publish
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
      - run: scripts/publish-crate.sh j2k-core
        env:
          CRATES_IO_API_TOKEN: ${{ secrets.CRATES_IO_API_TOKEN }}

  publish-j2k-profile:
    needs: [publish-j2k-core]
    runs-on: ubuntu-latest
    environment: crates-io-publish
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
      - run: scripts/publish-crate.sh j2k-profile
        env:
          CRATES_IO_API_TOKEN: ${{ secrets.CRATES_IO_API_TOKEN }}

  publish-j2k-types:
    needs: [publish-j2k-profile]
    runs-on: ubuntu-latest
    environment: crates-io-publish
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
