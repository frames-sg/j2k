[package]
name = "signinum-test-support"
description = "Dev-only fixtures and generators for signinum workspace tests"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish = false

[lib]
name = "signinum_test_support"
path = "src/lib.rs"

[features]
j2k-native-fixtures = ["dep:signinum-j2k-native"]

[dependencies]
signinum-j2k-native = { path = "../signinum-j2k-native", version = "=0.5.0", optional = true }

[lints.rust]
unsafe_code = "forbid"
unreachable_pub = "warn"

[lints.clippy]
pedantic = { level = "warn", priority = -1 }
module_name_repetitions = "allow"
must_use_candidate = "allow"
cast_possible_truncation = "allow"
cast_sign_loss = "allow"
