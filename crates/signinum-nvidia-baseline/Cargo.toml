[package]
name = "signinum-nvidia-baseline"
description = "NVIDIA GPU codec baseline (nvJPEG + nvJPEG2000) for benchmarking signinum's coefficient-domain JPEG to HTJ2K transcode"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish = false

[lib]
name = "signinum_nvidia_baseline"
path = "src/lib.rs"

[[bin]]
name = "transcode_compare"
path = "src/bin/transcode_compare.rs"

[features]
default = []
# Compile + link the C++ nvJPEG/nvJPEG2000 baseline. Runner-only: requires nvcc,
# libnvjpeg, and a separately-installed libnvjpeg2k. Also turns on the CUDA path
# for the signinum side of the comparison.
nvjpeg2000 = [
    "signinum-transcode-cuda/cuda-runtime",
    "dep:signinum-j2k-cuda",
    "signinum-j2k-cuda/cuda-runtime",
]

[dependencies]
signinum-transcode = { path = "../signinum-transcode", version = "=0.4.4" }
signinum-transcode-cuda = { path = "../signinum-transcode-cuda", version = "=0.4.4" }
signinum-j2k-cuda = { path = "../signinum-j2k-cuda", version = "=0.4.4", optional = true }
signinum-jpeg = { path = "../signinum-jpeg", version = "=0.4.4" }
signinum-j2k-native = { path = "../signinum-j2k-native", version = "=0.4.4" }

# Metal backend for the signinum side of the comparison on macOS (the runner is
# Linux/CUDA, so this is target-gated to keep the runner build untouched).
[target.'cfg(target_os = "macos")'.dependencies]
signinum-transcode-metal = { path = "../signinum-transcode-metal", version = "=0.4.4" }

[lints.rust]
unsafe_code = "allow"
unsafe_op_in_unsafe_fn = "deny"

[lints.clippy]
pedantic = { level = "warn", priority = -1 }
module_name_repetitions = "allow"
must_use_candidate = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
cast_possible_truncation = "allow"
cast_precision_loss = "allow"
cast_sign_loss = "allow"
