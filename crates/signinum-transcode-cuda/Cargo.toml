[package]
name = "signinum-transcode-cuda"
description = "CUDA acceleration for signinum-transcode coefficient-domain JPEG to HTJ2K paths"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
keywords.workspace = true
categories.workspace = true
readme = "README.md"

[package.metadata.docs.rs]
all-features = true
targets = []

[lib]
name = "signinum_transcode_cuda"
path = "src/lib.rs"

[features]
default = []
cuda-runtime = ["dep:signinum-cuda-runtime"]
cuda-profiling = ["cuda-runtime", "signinum-cuda-runtime/cuda-profiling"]

[dependencies]
signinum-transcode = { path = "../signinum-transcode", version = "=0.5.0" }
signinum-cuda-runtime = { path = "../signinum-cuda-runtime", version = "=0.5.0", optional = true }
signinum-j2k-native = { path = "../signinum-j2k-native", version = "=0.5.0" }

[dev-dependencies]
signinum-jpeg = { path = "../signinum-jpeg", version = "=0.5.0" }
signinum-test-support = { path = "../signinum-test-support" }

[lints.rust]
unsafe_code = "allow"
unsafe_op_in_unsafe_fn = "deny"
unreachable_pub = "warn"

[lints.clippy]
pedantic = { level = "warn", priority = -1 }
undocumented_unsafe_blocks = "warn"
module_name_repetitions = "allow"
must_use_candidate = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
cast_possible_truncation = "allow"
cast_precision_loss = "allow"
