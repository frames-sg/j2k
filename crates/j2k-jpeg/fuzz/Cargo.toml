[package]
name    = "j2k-jpeg-fuzz"
version = "0.1.0"
edition = "2021"
publish = false

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
j2k-jpeg = { path = ".." }

[[bin]]
name             = "parse_fuzz"
path             = "fuzz_targets/parse_fuzz.rs"
test             = false
doc              = false
bench            = false

[[bin]]
name             = "decode_fuzz"
path             = "fuzz_targets/decode_fuzz.rs"
test             = false
doc              = false
bench            = false

[[bin]]
name             = "region_scaled_fuzz"
path             = "fuzz_targets/region_scaled_fuzz.rs"
test             = false
doc              = false
bench            = false

[[bin]]
name             = "row_stream_fuzz"
path             = "fuzz_targets/row_stream_fuzz.rs"
test             = false
doc              = false
bench            = false

[profile.release]
debug = 1

# The fuzz crate is not part of the workspace; cargo-fuzz expects it to be an
# independent crate.
[workspace]
