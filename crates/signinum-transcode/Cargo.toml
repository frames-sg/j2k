[package]
name = "signinum-transcode"
description = "Experimental JPEG to HTJ2K transcode primitives for signinum"
version = "0.5.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
readme = "README.md"

[package.metadata.docs.rs]
all-features = true
targets = []

[lib]
name = "signinum_transcode"
path = "src/lib.rs"

[dependencies]
rayon = "1"
signinum-jpeg = { path = "../signinum-jpeg", version = "=0.5.0" }
signinum-j2k = { path = "../signinum-j2k", version = "=0.5.0" }
signinum-j2k-native = { path = "../signinum-j2k-native", version = "=0.5.0" }

[dev-dependencies]
criterion = { workspace = true }
proptest = { workspace = true }

[[bench]]
name = "dct53"
harness = false

[lints.rust]
unsafe_code = "forbid"
unreachable_pub = "warn"

[lints.clippy]
pedantic = { level = "warn", priority = -1 }
module_name_repetitions = "allow"
must_use_candidate = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
cast_possible_truncation = "allow"
cast_precision_loss = "allow"
