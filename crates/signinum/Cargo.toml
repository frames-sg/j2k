[package]
name = "signinum"
description = "Facade crate for signinum pathology image codecs"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
keywords.workspace = true
categories.workspace = true
readme = "README.md"

[package.metadata.docs.rs]
all-features = true
targets = []

[lib]
name = "signinum"
path = "src/lib.rs"

[features]
default = []
gpu = ["metal", "cuda"]
metal = ["dep:signinum-jpeg-metal", "dep:signinum-j2k-metal"]
cuda = ["dep:signinum-jpeg-cuda", "dep:signinum-j2k-cuda"]
cuda-runtime = [
    "cuda",
    "signinum-jpeg-cuda/cuda-runtime",
    "signinum-j2k-cuda/cuda-runtime",
]

[dependencies]
signinum-core = { path = "../signinum-core", version = "=0.5.0" }
signinum-jpeg = { path = "../signinum-jpeg", version = "=0.5.0" }
signinum-j2k = { path = "../signinum-j2k", version = "=0.5.0" }
signinum-tilecodec = { path = "../signinum-tilecodec", version = "=0.5.0" }
signinum-jpeg-metal = { path = "../signinum-jpeg-metal", version = "=0.5.0", optional = true }
signinum-j2k-metal = { path = "../signinum-j2k-metal", version = "=0.5.0", optional = true }
signinum-jpeg-cuda = { path = "../signinum-jpeg-cuda", version = "=0.5.0", optional = true }
signinum-j2k-cuda = { path = "../signinum-j2k-cuda", version = "=0.5.0", optional = true }

[dev-dependencies]
criterion = { workspace = true }
flate2 = { workspace = true }
signinum-j2k-native = { path = "../signinum-j2k-native", version = "=0.5.0" }
signinum-test-support = { path = "../signinum-test-support" }

[[bench]]
name = "facade"
harness = false

[lints]
workspace = true
