[advisories]
yanked     = "deny"
ignore     = [
    # Transitive via metal 0.33, the Metal binding release pinned in
    # [workspace.dependencies].
    # RUSTSEC-2024-0436 is an unmaintained advisory for paste, not a known
    # memory-safety or code-execution vulnerability. Current metal 0.33 still
    # depends on paste, and upstream closed paste removal as not planned.
    # Review-by: 2026-12-31.
    # Sources:
    # - https://crates.io/crates/metal
    # - https://github.com/gfx-rs/metal-rs/blob/master/Cargo.toml
    # - https://rustsec.org/advisories/RUSTSEC-2024-0436.html
    # - https://github.com/gfx-rs/metal-rs/issues/349
    "RUSTSEC-2024-0436",
    # Transitive via burn-core 0.21. RUSTSEC-2025-0141 records that bincode is
    # unmaintained; it does not report a memory-safety or code-execution flaw,
    # and the advisory has no safe upgrade. Re-evaluate when Burn changes its
    # serialization dependency.
    # Review-by: 2027-01-31.
    # Sources:
    # - https://rustsec.org/advisories/RUSTSEC-2025-0141.html
    # - https://github.com/tracel-ai/burn/tree/v0.21.0/crates/burn-core
    "RUSTSEC-2025-0141",
]

[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.93
exceptions = [
    # Version-scoped transitive exceptions from Burn 0.21. Keeping these
    # narrow prevents the licenses from becoming workspace-wide defaults.
    { crate = "colored@3.1.1", allow = ["MPL-2.0"] },
    { crate = "hexf-parse@0.2.1", allow = ["CC0-1.0"] },
    { crate = "option-ext@0.2.0", allow = ["MPL-2.0"] },
    { crate = "xxhash-rust@0.8.16", allow = ["BSL-1.0"] },
]

[bans]
multiple-versions = "warn"
wildcards         = "deny"
allow-wildcard-paths = true
deny              = []

[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
