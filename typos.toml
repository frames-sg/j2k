[files]
extend-exclude = [
    ".git",
    "target",
    "corpus/conformance",
]

[default]
extend-ignore-re = [
    "fnv1a64:[0-9a-f]+",
    "`[0-9a-f]{8}(?:[0-9a-f]{32})?`",
]

[default.extend-words]
APPn = "APPn"
flate = "flate"
iy = "iy"
OME = "OME"
ois = "ois"
Pn = "Pn"
Psot = "Psot"
setp = "setp"
SIZ = "SIZ"
Siz = "Siz"
TPsot = "TPsot"
YTO = "YTO"
siz = "siz"
yto = "yto"
