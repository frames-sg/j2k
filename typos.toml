[files]
extend-exclude = [
    ".git",
    "target",
    "corpus/conformance",
    "third_party/cubecl-cuda-0.10.0-patched",
    "third_party/cubecl-runtime-0.10.0-patched",
    "third_party/wgpu-29.0.4-patched",
    "third_party/wgpu-core-29.0.4-patched",
    "third_party/wgpu-hal-29.0.4-patched",
]

[default]
extend-ignore-re = [
    "fnv1a64:[0-9a-f]+",
    "`[0-9a-f]{8}(?:[0-9a-f]{32})?`",
]

[default.extend-words]
APPn = "APPn"
flate = "flate"
iy = "iy"
OME = "OME"
Nd = "Nd"
ois = "ois"
Pn = "Pn"
Psot = "Psot"
setp = "setp"
SIZ = "SIZ"
Siz = "Siz"
TPsot = "TPsot"
YTO = "YTO"
siz = "siz"
yto = "yto"
