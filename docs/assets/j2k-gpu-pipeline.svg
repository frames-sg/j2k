<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 500" role="img" aria-labelledby="title desc">
  <title id="title">J2K Rust JPEG 2000 GPU codec pipeline</title>
  <desc id="desc">A pipeline diagram showing JPEG 2000 and HTJ2K data flowing through Rust APIs to CPU, CUDA, and Metal backends.</desc>
  <rect width="760" height="500" fill="#f7f9fa"/>
  <g fill="#ffffff" stroke="#d6dee3" stroke-width="2">
    <rect x="44" y="54" width="200" height="96" rx="8"/>
    <rect x="280" y="54" width="200" height="96" rx="8"/>
    <rect x="516" y="54" width="200" height="96" rx="8"/>
    <rect x="44" y="220" width="200" height="96" rx="8"/>
    <rect x="280" y="220" width="200" height="96" rx="8"/>
    <rect x="516" y="220" width="200" height="96" rx="8"/>
    <rect x="162" y="380" width="200" height="78" rx="8"/>
    <rect x="398" y="380" width="200" height="78" rx="8"/>
  </g>
  <g font-family="Inter, Arial, sans-serif" fill="#172026">
    <text x="66" y="91" font-size="22" font-weight="700">JPEG 2000</text>
    <text x="66" y="119" font-size="15" fill="#52616b">JP2, J2K, J2C</text>
    <text x="302" y="91" font-size="22" font-weight="700">HTJ2K</text>
    <text x="302" y="119" font-size="15" fill="#52616b">Part 15 codestreams</text>
    <text x="538" y="91" font-size="22" font-weight="700">JPEG input</text>
    <text x="538" y="119" font-size="15" fill="#52616b">Transcode paths</text>

    <text x="66" y="257" font-size="22" font-weight="700">j2k crate</text>
    <text x="66" y="285" font-size="15" fill="#52616b">Rust decode, encode, recode</text>
    <text x="302" y="257" font-size="22" font-weight="700">CUDA adapter</text>
    <text x="302" y="285" font-size="15" fill="#52616b">NVIDIA device surfaces</text>
    <text x="538" y="257" font-size="22" font-weight="700">Metal adapter</text>
    <text x="538" y="285" font-size="15" fill="#52616b">Apple GPU surfaces</text>

    <text x="184" y="414" font-size="20" font-weight="700">CPU baseline</text>
    <text x="184" y="440" font-size="14" fill="#52616b">Portable correctness path</text>
    <text x="420" y="414" font-size="20" font-weight="700">Auto routing</text>
    <text x="420" y="440" font-size="14" fill="#52616b">Strict backend requests</text>
  </g>
  <g stroke="#0f766e" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M144 150v70"/>
    <path d="M380 150v70"/>
    <path d="M616 150v70"/>
    <path d="M244 268h36"/>
    <path d="M480 268h36"/>
    <path d="M144 316l118 64"/>
    <path d="M380 316l-118 64"/>
    <path d="M380 316l118 64"/>
    <path d="M616 316l-118 64"/>
  </g>
  <g fill="#0f766e">
    <path d="M144 224l-7-12h14z"/>
    <path d="M380 224l-7-12h14z"/>
    <path d="M616 224l-7-12h14z"/>
    <path d="M278 268l-12-7v14z"/>
    <path d="M514 268l-12-7v14z"/>
  </g>
</svg>
