[package]
name = "j2k-nvidia-baseline"
description = "NVIDIA GPU codec baseline (nvJPEG + nvJPEG2000) for benchmarking j2k's coefficient-domain JPEG to HTJ2K transcode"
version = "0.6.0"
edition = "2021"
rust-version = "1.96"
license = "Apache-2.0"
repository = "https://github.com/frames-sg/j2k"
publish = false

[lib]
name = "j2k_nvidia_baseline"
path = "src/lib.rs"

[[bin]]
name = "transcode_compare"
path = "src/bin/transcode_compare.rs"

[[bin]]
name = "decode_compare"
path = "src/bin/decode_compare.rs"

[[bin]]
name = "jpeg_decode_compare"
path = "src/bin/jpeg_decode_compare.rs"

[features]
default = []
# Compile + link the C++ nvJPEG/nvJPEG2000 baseline. Runner-only: requires nvcc,
# libnvjpeg, and a separately-installed libnvjpeg2k. Also turns on the CUDA path
# for the j2k side of the comparison.
nvjpeg2000 = [
    "dep:j2k-jpeg-cuda",
    "j2k-jpeg-cuda/cuda-runtime",
    "j2k-transcode-cuda/cuda-runtime",
    "dep:j2k-cuda",
    "j2k-cuda/cuda-runtime",
]

[dependencies]
j2k-core = { path = "../../crates/j2k-core", version = "=0.6.0" }
j2k-transcode = { path = "../../crates/j2k-transcode", version = "=0.6.0" }
j2k-transcode-cuda = { path = "../../crates/j2k-transcode-cuda", version = "=0.6.0" }
j2k-jpeg-cuda = { path = "../../crates/j2k-jpeg-cuda", version = "=0.6.0", optional = true }
j2k-cuda = { path = "../../crates/j2k-cuda", version = "=0.6.0", optional = true }
j2k-jpeg = { path = "../../crates/j2k-jpeg", version = "=0.6.0" }
j2k = { path = "../../crates/j2k", version = "=0.6.0" }
j2k-native = { path = "../../crates/j2k-native", version = "=0.6.0" }

# Metal backend for the j2k side of the comparison on macOS (the runner is
# Linux/CUDA, so this is target-gated to keep the runner build untouched).
[target.'cfg(target_os = "macos")'.dependencies]
j2k-transcode-metal = { path = "../../crates/j2k-transcode-metal", version = "=0.6.0" }

[lints.rust]
unsafe_code = "allow"
unsafe_op_in_unsafe_fn = "deny"

[lints.clippy]
pedantic = { level = "warn", priority = -1 }
undocumented_unsafe_blocks = "warn"
module_name_repetitions = "allow"
must_use_candidate = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
cast_possible_truncation = "allow"
cast_precision_loss = "allow"
cast_sign_loss = "allow"

[workspace]
resolver = "2"
